esphome:
  name: kh-aeration-min
  friendly_name: "KH Keeper Min"
  comment: "Minimal KH Keeper for bench testing."
  project:
    name: khkeeper.aeration
    version: "2026.04.02-ph-2point-pumps-split"
  on_boot:
    priority: 800
    then:
      - switch.turn_off: pump_p1_in
      - switch.turn_off: pump_p2_out
      - switch.turn_off: air_pump

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:
  level: WARN
  logs:
    sensor: WARN
    text_sensor: WARN
    component: WARN

api:

ota:
  - platform: esphome

web_server:
  port: 80
  version: 3
  log: false
  sorting_groups:
    - id: grp_kh
      name: "KH"
      sorting_weight: 10
    - id: grp_ph
      name: "pH"
      sorting_weight: 20
    - id: grp_pumps
      name: "Pumps"
      sorting_weight: 30
    - id: grp_service
      name: "Service"
      sorting_weight: 40
    - id: grp_manual
      name: "Manual"
      sorting_weight: 45
    - id: grp_diag
      name: "Diag"
      sorting_weight: 50

wifi:
  fast_connect: true
  reboot_timeout: 0s
  networks:
    - ssid: !secret wifi_ssid
      password: !secret wifi_password
      manual_ip:
        static_ip: 192.168.1.200
        gateway: 192.168.1.1
        subnet: 255.255.255.0
        dns1: 192.168.1.1
        dns2: 1.1.1.1
  ap:
    ssid: "KH Aeration Fallback"
    password: "fallback1234"

captive_portal:

i2c:
  sda: GPIO21
  scl: GPIO22
  frequency: 50000 Hz
  scan: true

one_wire:
  - platform: gpio
    pin: GPIO4
    id: dallas_bus

ads1115:
  - address: 0x48
    id: ads_main

time:
  - platform: sntp
    id: sntp_time

globals:
  - id: ph_cal1_v
    type: float
    restore_value: yes
    initial_value: "1.500"
  - id: ph_cal2_v
    type: float
    restore_value: yes
    initial_value: "2.500"
  - id: ph_slope
    type: float
    restore_value: yes
    initial_value: "-5.000"
  - id: ph_offset
    type: float
    restore_value: yes
    initial_value: "14.500"
  - id: p1_mlps
    type: float
    restore_value: yes
    initial_value: "0.0"
  - id: p2_mlps
    type: float
    restore_value: yes
    initial_value: "0.0"
  - id: g_speed_mult
    type: float
    restore_value: no
    initial_value: "1.0"
  - id: __t_fill_ms
    type: uint32_t
    restore_value: no
    initial_value: "0"
  - id: __t_drain_ms
    type: uint32_t
    restore_value: no
    initial_value: "0"
  - id: __t_predrain_ms
    type: uint32_t
    restore_value: no
    initial_value: "0"
  - id: __t_settle_pre_ms
    type: uint32_t
    restore_value: no
    initial_value: "0"
  - id: __t_aer_ms
    type: uint32_t
    restore_value: no
    initial_value: "0"
  - id: __t_settle_post_ms
    type: uint32_t
    restore_value: no
    initial_value: "0"

number:
  - platform: template
    name: "pH cal point 1 target"
    id: ph_cal1_target
    min_value: 3.0
    max_value: 9.5
    step: 0.01
    restore_value: true
    initial_value: 6.89
    optimistic: true
    web_server:
      sorting_group_id: grp_ph
      sorting_weight: 10

  - platform: template
    name: "pH cal point 2 target"
    id: ph_cal2_target
    min_value: 3.0
    max_value: 9.5
    step: 0.01
    restore_value: true
    initial_value: 9.12
    optimistic: true
    web_server:
      sorting_group_id: grp_ph
      sorting_weight: 11

  - platform: template
    name: "Chamber volume [ml]"
    id: chamber_ml
    min_value: 5
    max_value: 100
    step: 1
    restore_value: true
    initial_value: 60
    optimistic: true
    web_server:
      sorting_group_id: grp_kh
      sorting_weight: 10

  - platform: template
    name: "Fill fallback [s]"
    id: fallback_fill_s
    min_value: 1
    max_value: 120
    step: 1
    restore_value: true
    initial_value: 25
    optimistic: true
    internal: true

  - platform: template
    name: "Drain fallback [s]"
    id: fallback_drain_s
    min_value: 1
    max_value: 120
    step: 1
    restore_value: true
    initial_value: 25
    optimistic: true
    internal: true

  - platform: template
    name: "Aeration full [s]"
    id: t_aer_full
    min_value: 10
    max_value: 1800
    step: 5
    restore_value: true
    initial_value: 600
    optimistic: true
    internal: true

  - platform: template
    name: "Settle before [s]"
    id: t_settle_pre
    min_value: 0
    max_value: 600
    step: 5
    restore_value: true
    initial_value: 30
    optimistic: true
    internal: true

  - platform: template
    name: "Settle after [s]"
    id: t_settle_post
    min_value: 0
    max_value: 600
    step: 5
    restore_value: true
    initial_value: 20
    optimistic: true
    internal: true

  - platform: template
    name: "Quick factor"
    id: quick_factor
    min_value: 0.05
    max_value: 1.0
    step: 0.05
    restore_value: true
    initial_value: 0.25
    optimistic: true
    web_server:
      sorting_group_id: grp_kh
      sorting_weight: 70

  - platform: template
    name: "Service factor"
    id: service_test_factor
    min_value: 0.02
    max_value: 0.50
    step: 0.01
    restore_value: true
    initial_value: 0.10
    optimistic: true
    web_server:
      sorting_group_id: grp_service
      sorting_weight: 10

  - platform: template
    name: "CO2 equilibrium [mg per L]"
    id: co2_eq
    min_value: 1.0
    max_value: 10.0
    step: 0.1
    restore_value: true
    initial_value: 3.0
    optimistic: true
    web_server:
      sorting_group_id: grp_kh
      sorting_weight: 80

  - platform: template
    name: "Manual test volume [ml]"
    id: manual_test_volume_ml
    min_value: 1
    max_value: 100
    step: 1
    restore_value: true
    initial_value: 20
    optimistic: true
    web_server:
      sorting_group_id: grp_manual
      sorting_weight: 10

  - platform: template
    name: "Manual air pulse [s]"
    id: manual_air_pulse_s
    min_value: 1
    max_value: 30
    step: 1
    restore_value: true
    initial_value: 3
    optimistic: true
    web_server:
      sorting_group_id: grp_manual
      sorting_weight: 15

  - platform: template
    name: "P1 speed [%]"
    id: p1_speed_pct
    min_value: 10
    max_value: 100
    step: 1
    restore_value: true
    initial_value: 100
    optimistic: true
    web_server:
      sorting_group_id: grp_manual
      sorting_weight: 16

  - platform: template
    name: "P2 speed [%]"
    id: p2_speed_pct
    min_value: 10
    max_value: 100
    step: 1
    restore_value: true
    initial_value: 100
    optimistic: true
    web_server:
      sorting_group_id: grp_manual
      sorting_weight: 17

  - platform: template
    name: "P1 measured volume [ml]"
    id: p1_measured_ml
    min_value: 0
    max_value: 1000
    step: 1
    restore_value: false
    initial_value: 0
    optimistic: true
    web_server:
      sorting_group_id: grp_service
      sorting_weight: 30

  - platform: template
    name: "P2 measured volume [ml]"
    id: p2_measured_ml
    min_value: 0
    max_value: 1000
    step: 1
    restore_value: false
    initial_value: 0
    optimistic: true
    web_server:
      sorting_group_id: grp_service
      sorting_weight: 40

sensor:
  - platform: ads1115
    id: ph_a1_v
    multiplexer: A1_GND
    gain: 6.144
    update_interval: 10s
    name: "A1 pH voltage [V]"
    accuracy_decimals: 3
    filters:
      - sliding_window_moving_average:
          window_size: 8
          send_every: 1
    web_server:
      sorting_group_id: grp_ph
      sorting_weight: 30

  - platform: template
    id: ph_cal1_v_view
    name: "pH cal point 1 voltage [V]"
    update_interval: 5s
    unit_of_measurement: "V"
    accuracy_decimals: 3
    lambda: |-
      return id(ph_cal1_v);
    web_server:
      sorting_group_id: grp_ph
      sorting_weight: 35

  - platform: template
    id: ph_cal2_v_view
    name: "pH cal point 2 voltage [V]"
    update_interval: 5s
    unit_of_measurement: "V"
    accuracy_decimals: 3
    lambda: |-
      return id(ph_cal2_v);
    web_server:
      sorting_group_id: grp_ph
      sorting_weight: 36

  - platform: template
    id: ph_slope_view
    name: "pH slope [pH per V]"
    update_interval: 5s
    unit_of_measurement: "pH/V"
    accuracy_decimals: 3
    lambda: |-
      return id(ph_slope);
    web_server:
      sorting_group_id: grp_ph
      sorting_weight: 37

  - platform: template
    id: ph_offset_view
    name: "pH offset"
    update_interval: 5s
    accuracy_decimals: 3
    lambda: |-
      return id(ph_offset);
    web_server:
      sorting_group_id: grp_ph
      sorting_weight: 38

  - platform: template
    id: ph_main
    name: "Main pH"
    update_interval: 1s
    unit_of_measurement: "pH"
    accuracy_decimals: 2
    lambda: |-
      const float v = id(ph_a1_v).state;
      return id(ph_slope) * v + id(ph_offset);
    web_server:
      sorting_group_id: grp_ph
      sorting_weight: 50

  - platform: template
    id: ph_before
    name: "pH before aeration"
    update_interval: never
    unit_of_measurement: "pH"
    accuracy_decimals: 2
    web_server:
      sorting_group_id: grp_kh
      sorting_weight: 90

  - platform: template
    id: ph_after
    name: "pH after aeration"
    update_interval: never
    unit_of_measurement: "pH"
    accuracy_decimals: 2
    web_server:
      sorting_group_id: grp_kh
      sorting_weight: 100

  - platform: template
    id: kh_last
    name: "Last KH [dKH]"
    update_interval: never
    unit_of_measurement: "dKH"
    accuracy_decimals: 2
    web_server:
      sorting_group_id: grp_kh
      sorting_weight: 110

  - platform: template
    id: p1_mlps_view
    name: "P1 calibration [ml per s]"
    update_interval: 5s
    unit_of_measurement: "ml/s"
    accuracy_decimals: 3
    lambda: |-
      return id(p1_mlps);
    web_server:
      sorting_group_id: grp_pumps
      sorting_weight: 10

  - platform: template
    id: p2_mlps_view
    name: "P2 calibration [ml per s]"
    update_interval: 5s
    unit_of_measurement: "ml/s"
    accuracy_decimals: 3
    lambda: |-
      return id(p2_mlps);
    web_server:
      sorting_group_id: grp_pumps
      sorting_weight: 20

  - platform: wifi_signal
    name: "WiFi RSSI"
    id: api_wifi_rssi
    update_interval: 30s
    web_server:
      sorting_group_id: grp_diag
      sorting_weight: 10

  - platform: uptime
    name: "Uptime [s]"
    id: api_uptime_s
    update_interval: 60s
    web_server:
      sorting_group_id: grp_diag
      sorting_weight: 20

  - platform: dallas_temp
    name: "Dallas temp [C]"
    id: dallas_temp_c
    one_wire_id: dallas_bus
    update_interval: 10s
    accuracy_decimals: 2
    web_server:
      sorting_group_id: grp_diag
      sorting_weight: 25

binary_sensor:
  - platform: template
    id: p1_active_state
    name: "P1 active"
    device_class: power
    icon: mdi:pump
    web_server:
      sorting_group_id: grp_pumps
      sorting_weight: 31

  - platform: template
    id: p2_active_state
    name: "P2 active"
    device_class: power
    icon: mdi:pump
    web_server:
      sorting_group_id: grp_pumps
      sorting_weight: 41

  - platform: template
    id: air_active_state
    name: "Air active"
    device_class: power
    icon: mdi:weather-windy
    web_server:
      sorting_group_id: grp_pumps
      sorting_weight: 51

text_sensor:
  - platform: template
    id: kh_status_text
    name: "KH status"
    update_interval: never
    lambda: |-
      return {"Idle"};
    web_server:
      sorting_group_id: grp_kh
      sorting_weight: 120

  - platform: template
    id: kh_mode_text
    name: "KH mode"
    update_interval: never
    lambda: |-
      return {"Idle"};
    web_server:
      sorting_group_id: grp_kh
      sorting_weight: 130

  - platform: template
    id: kh_error_text
    name: "Last error"
    update_interval: never
    lambda: |-
      return {"None"};
    web_server:
      sorting_group_id: grp_diag
      sorting_weight: 30

  - platform: template
    id: ph_help_1
    name: "Info pH 1"
    update_interval: 60s
    lambda: |-
      return {"Ustaw punkt 1 (3.0-9.5), zanurz sonde, kliknij Capture pH point 1."};
    web_server:
      sorting_group_id: grp_ph
      sorting_weight: 63

  - platform: template
    id: ph_help_2
    name: "Info pH 2"
    update_interval: 60s
    lambda: |-
      return {"Zmien bufor, ustaw punkt 2, kliknij Capture pH point 2, potem Save pH 2-point calibration."};
    web_server:
      sorting_group_id: grp_ph
      sorting_weight: 64

  - platform: template
    id: p1_help
    name: "Info kalibracja P1"
    update_interval: 60s
    lambda: |-
      return {"Uruchom Calibrate P1 (60s), wpisz objetosc z wagi i kliknij Save P1 calibration."};
    web_server:
      sorting_group_id: grp_service
      sorting_weight: 71

  - platform: template
    id: p2_help
    name: "Info kalibracja P2"
    update_interval: 60s
    lambda: |-
      return {"Uruchom Calibrate P2 (60s), wpisz objetosc z wagi i kliknij Save P2 calibration."};
    web_server:
      sorting_group_id: grp_service
      sorting_weight: 81

  - platform: wifi_info
    ip_address:
      name: "IP address"
      id: api_ip_address
      web_server:
        sorting_group_id: grp_diag
        sorting_weight: 40
    ssid:
      name: "WiFi SSID"
      id: api_wifi_ssid
      web_server:
        sorting_group_id: grp_diag
        sorting_weight: 50
    mac_address:
      name: "WiFi MAC"
      id: api_wifi_mac
      web_server:
        sorting_group_id: grp_diag
        sorting_weight: 60

  - platform: version
    name: "ESPHome version"
    id: api_version
    web_server:
      sorting_group_id: grp_diag
      sorting_weight: 70

output:
  - platform: ledc
    id: pump_p1_pwm
    pin: GPIO25
    frequency: 1000 Hz

  - platform: ledc
    id: pump_p2_pwm
    pin: GPIO26
    frequency: 1000 Hz

switch:
  - platform: template
    id: pump_p1_in
    name: "P1 intake"
    optimistic: true
    turn_on_action:
      - switch.turn_off: pump_p2_out
      - output.set_level:
          id: pump_p1_pwm
          level: !lambda "return id(p1_speed_pct).state / 100.0f;"
      - binary_sensor.template.publish:
          id: p1_active_state
          state: ON
    turn_off_action:
      - output.set_level:
          id: pump_p1_pwm
          level: 0.0
      - binary_sensor.template.publish:
          id: p1_active_state
          state: OFF
    web_server:
      sorting_group_id: grp_pumps
      sorting_weight: 30

  - platform: template
    id: pump_p2_out
    name: "P2 return"
    optimistic: true
    turn_on_action:
      - switch.turn_off: pump_p1_in
      - output.set_level:
          id: pump_p2_pwm
          level: !lambda "return id(p2_speed_pct).state / 100.0f;"
      - binary_sensor.template.publish:
          id: p2_active_state
          state: ON
    turn_off_action:
      - output.set_level:
          id: pump_p2_pwm
          level: 0.0
      - binary_sensor.template.publish:
          id: p2_active_state
          state: OFF
    web_server:
      sorting_group_id: grp_pumps
      sorting_weight: 40

  - platform: gpio
    id: air_pump
    name: "Air pump"
    pin: GPIO27
    restore_mode: ALWAYS_OFF
    on_turn_on:
      - binary_sensor.template.publish:
          id: air_active_state
          state: ON
    on_turn_off:
      - binary_sensor.template.publish:
          id: air_active_state
          state: OFF
    web_server:
      sorting_group_id: grp_pumps
      sorting_weight: 50

  - platform: template
    id: manual_hold_p1
    name: "Manual hold P1"
    optimistic: true
    turn_on_action:
      - text_sensor.template.publish:
          id: kh_mode_text
          state: "Manual IO hold"
      - text_sensor.template.publish:
          id: kh_status_text
          state: "Manual hold: P1 ON"
      - switch.turn_off: manual_hold_p2
      - switch.turn_off: manual_hold_air
      - switch.turn_on: pump_p1_in
    turn_off_action:
      - switch.turn_off: pump_p1_in
      - text_sensor.template.publish:
          id: kh_status_text
          state: "Manual hold: P1 OFF"
    web_server:
      sorting_group_id: grp_manual
      sorting_weight: 20

  - platform: template
    id: manual_hold_p2
    name: "Manual hold P2"
    optimistic: true
    turn_on_action:
      - text_sensor.template.publish:
          id: kh_mode_text
          state: "Manual IO hold"
      - text_sensor.template.publish:
          id: kh_status_text
          state: "Manual hold: P2 ON"
      - switch.turn_off: manual_hold_p1
      - switch.turn_off: manual_hold_air
      - switch.turn_on: pump_p2_out
    turn_off_action:
      - switch.turn_off: pump_p2_out
      - text_sensor.template.publish:
          id: kh_status_text
          state: "Manual hold: P2 OFF"
    web_server:
      sorting_group_id: grp_manual
      sorting_weight: 30

  - platform: template
    id: manual_hold_air
    name: "Manual hold air"
    optimistic: true
    turn_on_action:
      - text_sensor.template.publish:
          id: kh_mode_text
          state: "Manual IO hold"
      - text_sensor.template.publish:
          id: kh_status_text
          state: "Manual hold: Air ON"
      - switch.turn_off: manual_hold_p1
      - switch.turn_off: manual_hold_p2
      - switch.turn_on: air_pump
    turn_off_action:
      - switch.turn_off: air_pump
      - text_sensor.template.publish:
          id: kh_status_text
          state: "Manual hold: Air OFF"
    web_server:
      sorting_group_id: grp_manual
      sorting_weight: 40

button:
  - platform: template
    name: "Capture pH point 1"
    id: api_ph_cal_p1_capture
    on_press:
      - lambda: |-
          const float v = id(ph_a1_v).state;
          id(ph_cal1_v) = v;
          id(kh_error_text).publish_state("None");
          ESP_LOGI("ph", "Captured pH point1: target=%.2f, V=%.3f",
                   id(ph_cal1_target).state, v);
      - text_sensor.template.publish:
          id: kh_status_text
          state: "Captured pH point 1"
    web_server:
      sorting_group_id: grp_ph
      sorting_weight: 60

  - platform: template
    name: "Capture pH point 2"
    id: api_ph_cal_p2_capture
    on_press:
      - lambda: |-
          const float v = id(ph_a1_v).state;
          id(ph_cal2_v) = v;
          id(kh_error_text).publish_state("None");
          ESP_LOGI("ph", "Captured pH point2: target=%.2f, V=%.3f",
                   id(ph_cal2_target).state, v);
      - text_sensor.template.publish:
          id: kh_status_text
          state: "Captured pH point 2"
    web_server:
      sorting_group_id: grp_ph
      sorting_weight: 61

  - platform: template
    name: "Save pH 2-point calibration"
    id: api_ph_cal_2point_save
    on_press:
      - lambda: |-
          const float v1 = id(ph_cal1_v);
          const float v2 = id(ph_cal2_v);
          const float p1 = id(ph_cal1_target).state;
          const float p2 = id(ph_cal2_target).state;
          const float dv = v2 - v1;
          const float dp = p2 - p1;
          if (fabsf(dv) < 0.005f || fabsf(dp) < 0.05f) {
            id(kh_error_text).publish_state("Invalid pH 2-point calibration");
            ESP_LOGW("ph", "Invalid pH 2-point: v1=%.3f v2=%.3f p1=%.2f p2=%.2f", v1, v2, p1, p2);
            return;
          }
          id(ph_slope) = dp / dv;
          id(ph_offset) = p1 - id(ph_slope) * v1;
          id(kh_error_text).publish_state("None");
          ESP_LOGI("ph", "Saved pH 2-point: slope=%.4f offset=%.4f", id(ph_slope), id(ph_offset));
      - component.update: ph_main
      - text_sensor.template.publish:
          id: kh_status_text
          state: "pH 2-point calibration saved"
    web_server:
      sorting_group_id: grp_ph
      sorting_weight: 62

  - platform: template
    name: "Calibrate P1 (60s)"
    id: api_cal_p1_30s
    on_press:
      - text_sensor.template.publish:
          id: kh_mode_text
          state: "Pump calibration"
      - text_sensor.template.publish:
          id: kh_status_text
          state: "P1 calibration running (60s)"
      - switch.turn_on: pump_p1_in
      - delay: 60s
      - switch.turn_off: pump_p1_in
      - text_sensor.template.publish:
          id: kh_status_text
          state: "Enter P1 measured volume (from 60s run)"
    web_server:
      sorting_group_id: grp_service
      sorting_weight: 50

  - platform: template
    name: "Manual test P1"
    id: api_manual_test_p1
    on_press:
      - text_sensor.template.publish:
          id: kh_mode_text
          state: "Manual IO test"
      - text_sensor.template.publish:
          id: kh_status_text
          state: "Manual test: P1"
      - switch.turn_off: pump_p2_out
      - switch.turn_off: air_pump
      - if:
          condition:
            lambda: "return id(p1_mlps) > 0.01f;"
          then:
            - switch.turn_on: pump_p1_in
            - delay: !lambda "return (uint32_t) ((id(manual_test_volume_ml).state / id(p1_mlps)) * 1000.0f);"
            - switch.turn_off: pump_p1_in
            - text_sensor.template.publish:
                id: kh_status_text
                state: "Manual test P1 done"
          else:
            - text_sensor.template.publish:
                id: kh_status_text
                state: "Manual test P1 blocked"
            - text_sensor.template.publish:
                id: kh_error_text
                state: "Missing P1 calibration"
            - logger.log:
                level: WARN
                tag: pump
                format: "Manual test P1 blocked: missing P1 calibration"
    web_server:
      sorting_group_id: grp_manual
      sorting_weight: 50

  - platform: template
    name: "Calibrate P2 (60s)"
    id: api_cal_p2_30s
    on_press:
      - text_sensor.template.publish:
          id: kh_mode_text
          state: "Pump calibration"
      - text_sensor.template.publish:
          id: kh_status_text
          state: "P2 calibration running (60s)"
      - switch.turn_on: pump_p2_out
      - delay: 60s
      - switch.turn_off: pump_p2_out
      - text_sensor.template.publish:
          id: kh_status_text
          state: "Enter P2 measured volume (from 60s run)"
    web_server:
      sorting_group_id: grp_service
      sorting_weight: 60

  - platform: template
    name: "Manual test P2"
    id: api_manual_test_p2
    on_press:
      - text_sensor.template.publish:
          id: kh_mode_text
          state: "Manual IO test"
      - text_sensor.template.publish:
          id: kh_status_text
          state: "Manual test: P2"
      - switch.turn_off: pump_p1_in
      - switch.turn_off: air_pump
      - if:
          condition:
            lambda: "return id(p2_mlps) > 0.01f;"
          then:
            - switch.turn_on: pump_p2_out
            - delay: !lambda "return (uint32_t) ((id(manual_test_volume_ml).state / id(p2_mlps)) * 1000.0f);"
            - switch.turn_off: pump_p2_out
            - text_sensor.template.publish:
                id: kh_status_text
                state: "Manual test P2 done"
          else:
            - text_sensor.template.publish:
                id: kh_status_text
                state: "Manual test P2 blocked"
            - text_sensor.template.publish:
                id: kh_error_text
                state: "Missing P2 calibration"
            - logger.log:
                level: WARN
                tag: pump
                format: "Manual test P2 blocked: missing P2 calibration"
    web_server:
      sorting_group_id: grp_manual
      sorting_weight: 60

  - platform: template
    name: "Manual test air"
    id: api_manual_test_air
    on_press:
      - text_sensor.template.publish:
          id: kh_mode_text
          state: "Manual IO test"
      - text_sensor.template.publish:
          id: kh_status_text
          state: "Manual test: Air"
      - switch.turn_off: pump_p1_in
      - switch.turn_off: pump_p2_out
      - switch.turn_on: air_pump
      - delay: !lambda "return (uint32_t) (id(manual_air_pulse_s).state * 1000.0f);"
      - switch.turn_off: air_pump
      - text_sensor.template.publish:
          id: kh_status_text
          state: "Manual test air done"
    web_server:
      sorting_group_id: grp_manual
      sorting_weight: 70

  - platform: template
    name: "Save P1 calibration"
    id: api_cal_p1_save
    on_press:
      - lambda: |-
          const float cal_time_s = 60.0f;
          if (cal_time_s <= 0.0f || id(p1_measured_ml).state <= 0.0f) {
            id(kh_error_text).publish_state("Invalid P1 calibration input");
            ESP_LOGW("pump", "Invalid P1 calibration input");
            return;
          }
          id(p1_mlps) = id(p1_measured_ml).state / cal_time_s;
          id(kh_error_text).publish_state("None");
          ESP_LOGI("pump", "P1 ml/s = %.3f", id(p1_mlps));
      - text_sensor.template.publish:
          id: kh_status_text
          state: "P1 calibration saved"
    web_server:
      sorting_group_id: grp_service
      sorting_weight: 70

  - platform: template
    name: "Save P2 calibration"
    id: api_cal_p2_save
    on_press:
      - lambda: |-
          const float cal_time_s = 60.0f;
          if (cal_time_s <= 0.0f || id(p2_measured_ml).state <= 0.0f) {
            id(kh_error_text).publish_state("Invalid P2 calibration input");
            ESP_LOGW("pump", "Invalid P2 calibration input");
            return;
          }
          id(p2_mlps) = id(p2_measured_ml).state / cal_time_s;
          id(kh_error_text).publish_state("None");
          ESP_LOGI("pump", "P2 ml/s = %.3f", id(p2_mlps));
      - text_sensor.template.publish:
          id: kh_status_text
          state: "P2 calibration saved"
    web_server:
      sorting_group_id: grp_service
      sorting_weight: 80

  - platform: template
    name: "Start KH full"
    id: api_start_measure_full
    on_press:
      - text_sensor.template.publish:
          id: kh_mode_text
          state: "Full"
      - lambda: |-
          id(g_speed_mult) = 1.0f;
      - script.execute: kh_aer_core
    web_server:
      sorting_group_id: grp_kh
      sorting_weight: 140

  - platform: template
    name: "Start KH quick"
    id: api_start_measure_quick
    on_press:
      - text_sensor.template.publish:
          id: kh_mode_text
          state: "Quick"
      - lambda: |-
          id(g_speed_mult) = id(quick_factor).state;
      - script.execute: kh_aer_core
    web_server:
      sorting_group_id: grp_kh
      sorting_weight: 150

  - platform: template
    name: "Start KH quick 60s"
    id: api_start_measure_quick_60s
    on_press:
      - text_sensor.template.publish:
          id: kh_mode_text
          state: "Quick 60s"
      - lambda: |-
          const float vol_ml = id(chamber_ml).state;
          float t_fill_s = (id(p1_mlps) > 0.01f) ? (vol_ml / id(p1_mlps)) : id(fallback_fill_s).state;
          float t_drain_s = (id(p2_mlps) > 0.01f) ? (vol_ml / id(p2_mlps)) : id(fallback_drain_s).state;
          const float base_total_s =
              t_drain_s + t_fill_s + id(t_settle_pre).state + id(t_aer_full).state + id(t_settle_post).state + t_drain_s;
          const float target_total_s = 60.0f;
          float mult = target_total_s / ((base_total_s > 1.0f) ? base_total_s : 1.0f);
          if (mult < 0.02f) mult = 0.02f;
          if (mult > 3.00f) mult = 3.00f;
          id(g_speed_mult) = mult;
          ESP_LOGI("kh", "Quick60 target=%.1fs base=%.1fs mult=%.3f", target_total_s, base_total_s, mult);
      - script.execute: kh_aer_core
    web_server:
      sorting_group_id: grp_kh
      sorting_weight: 155

  - platform: template
    name: "Start service test"
    id: api_start_measure_service
    on_press:
      - text_sensor.template.publish:
          id: kh_mode_text
          state: "Service test"
      - lambda: |-
          id(g_speed_mult) = id(service_test_factor).state;
      - script.execute: kh_aer_core
    web_server:
      sorting_group_id: grp_service
      sorting_weight: 90

  - platform: template
    name: "KH STOP"
    id: api_kh_stop
    on_press:
      - script.stop: kh_aer_core
      - switch.turn_off: pump_p1_in
      - switch.turn_off: pump_p2_out
      - switch.turn_off: air_pump
      - switch.turn_off: manual_hold_p1
      - switch.turn_off: manual_hold_p2
      - switch.turn_off: manual_hold_air
      - text_sensor.template.publish:
          id: kh_status_text
          state: "Stopped"
      - text_sensor.template.publish:
          id: kh_mode_text
          state: "Stopped"
    web_server:
      sorting_group_id: grp_kh
      sorting_weight: 160

script:
  - id: kh_aer_core
    mode: restart
    then:
      - text_sensor.template.publish:
          id: kh_status_text
          state: "Prepare times"
      - lambda: |-
          const float configured_vol_ml = id(chamber_ml).state;
          const float vol_ml = (configured_vol_ml > 100.0f) ? 100.0f : configured_vol_ml;
          const float mult = id(g_speed_mult);
          float t_fill_s = (id(p1_mlps) > 0.01f) ? (vol_ml / id(p1_mlps)) : id(fallback_fill_s).state;
          float t_drain_s = (id(p2_mlps) > 0.01f) ? (vol_ml / id(p2_mlps)) : id(fallback_drain_s).state;
          id(__t_fill_ms) = (uint32_t) (t_fill_s * 1000.0f * mult);
          id(__t_drain_ms) = (uint32_t) (t_drain_s * 1000.0f * mult);
          id(__t_predrain_ms) = (uint32_t) (t_drain_s * 1000.0f * mult * 1.5f);
          id(__t_settle_pre_ms) = (uint32_t) (id(t_settle_pre).state * 1000.0f * mult);
          id(__t_aer_ms) = (uint32_t) (id(t_aer_full).state * 1000.0f * mult);
          id(__t_settle_post_ms) = (uint32_t) (id(t_settle_post).state * 1000.0f * mult);
          if (configured_vol_ml > 100.0f) {
            id(kh_error_text).publish_state("Chamber volume capped to 100 ml");
            ESP_LOGW("kh", "Configured chamber_ml=%.1f > 100.0, capped to 100.0 ml", configured_vol_ml);
          } else {
            id(kh_error_text).publish_state("None");
          }
          ESP_LOGI("kh", "Times[ms] mult=%.2f predrain=%u fill=%u drain=%u settle_pre=%u aer=%u settle_post=%u",
                   mult, id(__t_predrain_ms), id(__t_fill_ms), id(__t_drain_ms), id(__t_settle_pre_ms), id(__t_aer_ms), id(__t_settle_post_ms));

      - text_sensor.template.publish:
          id: kh_status_text
          state: "Pre-drain chamber"
      - switch.turn_on: pump_p2_out
      - delay: !lambda "return id(__t_predrain_ms);"
      - switch.turn_off: pump_p2_out

      - text_sensor.template.publish:
          id: kh_status_text
          state: "Fill sample"
      - switch.turn_on: pump_p1_in
      - delay: !lambda "return id(__t_fill_ms);"
      - switch.turn_off: pump_p1_in

      - text_sensor.template.publish:
          id: kh_status_text
          state: "Settle before"
      - delay: !lambda "return id(__t_settle_pre_ms);"

      - component.update: ph_a1_v
      - component.update: ph_main
      - lambda: |-
          id(ph_before).publish_state(id(ph_main).state);
          ESP_LOGI("kh", "pH_before=%.2f", id(ph_before).state);

      - text_sensor.template.publish:
          id: kh_status_text
          state: "Aeration"
      - switch.turn_on: air_pump
      - delay: !lambda "return id(__t_aer_ms);"
      - switch.turn_off: air_pump

      - text_sensor.template.publish:
          id: kh_status_text
          state: "Settle after"
      - delay: !lambda "return id(__t_settle_post_ms);"

      - component.update: ph_a1_v
      - component.update: ph_main
      - lambda: |-
          const float ph2 = id(ph_main).state;
          id(ph_after).publish_state(ph2);
          const float co2eq = id(co2_eq).state;
          const float denom = 3.0f * powf(10.0f, (7.0f - ph2));
          float kh = (denom > 0.0f) ? (co2eq / denom) : 0.0f;
          if (kh < 0.0f) kh = 0.0f;
          if (kh > 30.0f) kh = 30.0f;
          id(kh_last).publish_state(kh);
          ESP_LOGI("kh", "pH_after=%.2f -> KH=%.2f dKH", ph2, kh);

      - text_sensor.template.publish:
          id: kh_status_text
          state: "Return sample"
      - switch.turn_on: pump_p2_out
      - delay: !lambda "return id(__t_drain_ms);"
      - switch.turn_off: pump_p2_out

      - text_sensor.template.publish:
          id: kh_status_text
          state: "Completed"
