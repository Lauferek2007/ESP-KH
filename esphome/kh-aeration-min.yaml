esphome:
  name: kh-aeration-min
  friendly_name: "KH Keeper Min"
  comment: "Minimal KH Keeper for bench testing."
  project:
    name: khkeeper.aeration
    version: "2026.04.01-testbench"
  on_boot:
    priority: 800
    then:
      - switch.turn_off: pump_p1_in
      - switch.turn_off: pump_p2_out
      - switch.turn_off: air_pump

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:
  level: DEBUG

api:

ota:
  - platform: esphome

web_server:
  port: 80
  version: 3
  sorting_groups:
    - id: grp_kh
      name: "KH"
      sorting_weight: 10
    - id: grp_ph
      name: "pH"
      sorting_weight: 20
    - id: grp_pumps
      name: "Pumps"
      sorting_weight: 30
    - id: grp_service
      name: "Service"
      sorting_weight: 40
    - id: grp_diag
      name: "Diag"
      sorting_weight: 50

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true
  reboot_timeout: 0s
  ap:
    ssid: "KH Aeration Fallback"
    password: "fallback1234"

captive_portal:

time:
  - platform: sntp
    id: sntp_time

globals:
  - id: main_ph_channel
    type: int
    restore_value: yes
    initial_value: "0"
  - id: ph_off_a0
    type: float
    restore_value: yes
    initial_value: "7.00"
  - id: ph_off_a1
    type: float
    restore_value: yes
    initial_value: "7.00"
  - id: p1_mlps
    type: float
    restore_value: yes
    initial_value: "0.0"
  - id: p2_mlps
    type: float
    restore_value: yes
    initial_value: "0.0"
  - id: g_speed_mult
    type: float
    restore_value: no
    initial_value: "1.0"
  - id: __t_fill_ms
    type: uint32_t
    restore_value: no
    initial_value: "0"
  - id: __t_drain_ms
    type: uint32_t
    restore_value: no
    initial_value: "0"
  - id: __t_settle_pre_ms
    type: uint32_t
    restore_value: no
    initial_value: "0"
  - id: __t_aer_ms
    type: uint32_t
    restore_value: no
    initial_value: "0"
  - id: __t_settle_post_ms
    type: uint32_t
    restore_value: no
    initial_value: "0"

number:
  - platform: template
    name: "pH scale [pH per V]"
    id: ph_scale
    min_value: -10
    max_value: 10
    step: 0.01
    restore_value: true
    initial_value: -5.00
    optimistic: true
    web_server:
      sorting_group_id: grp_ph
      sorting_weight: 10

  - platform: template
    name: "Chamber volume [ml]"
    id: chamber_ml
    min_value: 5
    max_value: 500
    step: 1
    restore_value: true
    initial_value: 60
    optimistic: true
    web_server:
      sorting_group_id: grp_kh
      sorting_weight: 10

  - platform: template
    name: "Fill fallback [s]"
    id: fallback_fill_s
    min_value: 1
    max_value: 120
    step: 1
    restore_value: true
    initial_value: 25
    optimistic: true
    web_server:
      sorting_group_id: grp_kh
      sorting_weight: 20

  - platform: template
    name: "Drain fallback [s]"
    id: fallback_drain_s
    min_value: 1
    max_value: 120
    step: 1
    restore_value: true
    initial_value: 25
    optimistic: true
    web_server:
      sorting_group_id: grp_kh
      sorting_weight: 30

  - platform: template
    name: "Aeration full [s]"
    id: t_aer_full
    min_value: 10
    max_value: 1800
    step: 5
    restore_value: true
    initial_value: 600
    optimistic: true
    web_server:
      sorting_group_id: grp_kh
      sorting_weight: 40

  - platform: template
    name: "Settle before [s]"
    id: t_settle_pre
    min_value: 0
    max_value: 600
    step: 5
    restore_value: true
    initial_value: 30
    optimistic: true
    web_server:
      sorting_group_id: grp_kh
      sorting_weight: 50

  - platform: template
    name: "Settle after [s]"
    id: t_settle_post
    min_value: 0
    max_value: 600
    step: 5
    restore_value: true
    initial_value: 20
    optimistic: true
    web_server:
      sorting_group_id: grp_kh
      sorting_weight: 60

  - platform: template
    name: "Quick factor"
    id: quick_factor
    min_value: 0.05
    max_value: 1.0
    step: 0.05
    restore_value: true
    initial_value: 0.25
    optimistic: true
    web_server:
      sorting_group_id: grp_kh
      sorting_weight: 70

  - platform: template
    name: "Service factor"
    id: service_test_factor
    min_value: 0.02
    max_value: 0.50
    step: 0.01
    restore_value: true
    initial_value: 0.10
    optimistic: true
    web_server:
      sorting_group_id: grp_service
      sorting_weight: 10

  - platform: template
    name: "CO2 equilibrium [mg per L]"
    id: co2_eq
    min_value: 1.0
    max_value: 10.0
    step: 0.1
    restore_value: true
    initial_value: 3.0
    optimistic: true
    web_server:
      sorting_group_id: grp_kh
      sorting_weight: 80

  - platform: template
    name: "Pump calibration time [s]"
    id: pump_calibration_time_s
    min_value: 5
    max_value: 120
    step: 1
    restore_value: true
    initial_value: 30
    optimistic: true
    web_server:
      sorting_group_id: grp_service
      sorting_weight: 20

  - platform: template
    name: "P1 measured volume [ml]"
    id: p1_measured_ml
    min_value: 0
    max_value: 1000
    step: 1
    restore_value: false
    initial_value: 0
    optimistic: true
    web_server:
      sorting_group_id: grp_service
      sorting_weight: 30

  - platform: template
    name: "P2 measured volume [ml]"
    id: p2_measured_ml
    min_value: 0
    max_value: 1000
    step: 1
    restore_value: false
    initial_value: 0
    optimistic: true
    web_server:
      sorting_group_id: grp_service
      sorting_weight: 40

select:
  - platform: template
    name: "Main pH channel"
    id: ph_main_select
    optimistic: true
    options:
      - "A0"
      - "A1"
    initial_option: "A0"
    set_action:
      - lambda: |-
          if (x == "A0") {
            id(main_ph_channel) = 0;
          } else {
            id(main_ph_channel) = 1;
          }
    web_server:
      sorting_group_id: grp_ph
      sorting_weight: 20

sensor:
  - platform: adc
    id: ph_a0_v
    pin: GPIO32
    attenuation: 12db
    update_interval: 1s
    name: "A0 pH voltage [V]"
    accuracy_decimals: 3
    filters:
      - multiply: 3.3
      - sliding_window_moving_average:
          window_size: 8
          send_every: 1
    web_server:
      sorting_group_id: grp_ph
      sorting_weight: 30

  - platform: adc
    id: ph_a1_v
    pin: GPIO33
    attenuation: 12db
    update_interval: 1s
    name: "A1 pH voltage [V]"
    accuracy_decimals: 3
    filters:
      - multiply: 3.3
      - sliding_window_moving_average:
          window_size: 8
          send_every: 1
    web_server:
      sorting_group_id: grp_ph
      sorting_weight: 40

  - platform: template
    id: ph_main
    name: "Main pH"
    update_interval: 1s
    unit_of_measurement: "pH"
    accuracy_decimals: 2
    lambda: |-
      const float v = (id(main_ph_channel) == 0) ? id(ph_a0_v).state : id(ph_a1_v).state;
      const float scale = id(ph_scale).state;
      const float off = (id(main_ph_channel) == 0) ? id(ph_off_a0) : id(ph_off_a1);
      return scale * v + off;
    web_server:
      sorting_group_id: grp_ph
      sorting_weight: 50

  - platform: template
    id: ph_before
    name: "pH before aeration"
    update_interval: never
    unit_of_measurement: "pH"
    accuracy_decimals: 2
    web_server:
      sorting_group_id: grp_kh
      sorting_weight: 90

  - platform: template
    id: ph_after
    name: "pH after aeration"
    update_interval: never
    unit_of_measurement: "pH"
    accuracy_decimals: 2
    web_server:
      sorting_group_id: grp_kh
      sorting_weight: 100

  - platform: template
    id: kh_last
    name: "Last KH [dKH]"
    update_interval: never
    unit_of_measurement: "dKH"
    accuracy_decimals: 2
    web_server:
      sorting_group_id: grp_kh
      sorting_weight: 110

  - platform: template
    id: p1_mlps_view
    name: "P1 calibration [ml per s]"
    update_interval: 5s
    unit_of_measurement: "ml/s"
    accuracy_decimals: 3
    lambda: |-
      return id(p1_mlps);
    web_server:
      sorting_group_id: grp_pumps
      sorting_weight: 10

  - platform: template
    id: p2_mlps_view
    name: "P2 calibration [ml per s]"
    update_interval: 5s
    unit_of_measurement: "ml/s"
    accuracy_decimals: 3
    lambda: |-
      return id(p2_mlps);
    web_server:
      sorting_group_id: grp_pumps
      sorting_weight: 20

  - platform: wifi_signal
    name: "WiFi RSSI"
    id: api_wifi_rssi
    update_interval: 30s
    web_server:
      sorting_group_id: grp_diag
      sorting_weight: 10

  - platform: uptime
    name: "Uptime [s]"
    id: api_uptime_s
    update_interval: 60s
    web_server:
      sorting_group_id: grp_diag
      sorting_weight: 20

text_sensor:
  - platform: template
    id: kh_status_text
    name: "KH status"
    update_interval: never
    lambda: |-
      return {"Idle"};
    web_server:
      sorting_group_id: grp_kh
      sorting_weight: 120

  - platform: template
    id: kh_mode_text
    name: "KH mode"
    update_interval: never
    lambda: |-
      return {"Idle"};
    web_server:
      sorting_group_id: grp_kh
      sorting_weight: 130

  - platform: template
    id: kh_error_text
    name: "Last error"
    update_interval: never
    lambda: |-
      return {"None"};
    web_server:
      sorting_group_id: grp_diag
      sorting_weight: 30

  - platform: wifi_info
    ip_address:
      name: "IP address"
      id: api_ip_address
      web_server:
        sorting_group_id: grp_diag
        sorting_weight: 40
    ssid:
      name: "WiFi SSID"
      id: api_wifi_ssid
      web_server:
        sorting_group_id: grp_diag
        sorting_weight: 50
    mac_address:
      name: "WiFi MAC"
      id: api_wifi_mac
      web_server:
        sorting_group_id: grp_diag
        sorting_weight: 60

  - platform: version
    name: "ESPHome version"
    id: api_version
    web_server:
      sorting_group_id: grp_diag
      sorting_weight: 70

switch:
  - platform: gpio
    id: pump_p1_in
    name: "P1 intake"
    pin: GPIO25
    restore_mode: ALWAYS_OFF
    web_server:
      sorting_group_id: grp_pumps
      sorting_weight: 30

  - platform: gpio
    id: pump_p2_out
    name: "P2 return"
    pin: GPIO26
    interlock:
      - pump_p1_in
    interlock_wait_time: 50ms
    restore_mode: ALWAYS_OFF
    web_server:
      sorting_group_id: grp_pumps
      sorting_weight: 40

  - platform: gpio
    id: air_pump
    name: "Air pump"
    pin: GPIO27
    restore_mode: ALWAYS_OFF
    web_server:
      sorting_group_id: grp_pumps
      sorting_weight: 50

button:
  - platform: template
    name: "Calibrate pH 7.00"
    id: api_ph7_cal
    on_press:
      - lambda: |-
          const float v = (id(main_ph_channel) == 0) ? id(ph_a0_v).state : id(ph_a1_v).state;
          const float scale = id(ph_scale).state;
          const float new_off = 7.0f - scale * v;
          if (id(main_ph_channel) == 0) {
            id(ph_off_a0) = new_off;
          } else {
            id(ph_off_a1) = new_off;
          }
          id(kh_error_text).publish_state("None");
          ESP_LOGI("ph", "Calibrate pH7 scale=%.3f V=%.3f offset=%.3f channel=%s",
                   scale, v, new_off, (id(main_ph_channel) == 0) ? "A0" : "A1");
    web_server:
      sorting_group_id: grp_ph
      sorting_weight: 60

  - platform: template
    name: "P1 calibration run"
    id: api_cal_p1_30s
    on_press:
      - text_sensor.template.publish:
          id: kh_mode_text
          state: "Pump calibration"
      - text_sensor.template.publish:
          id: kh_status_text
          state: "P1 calibration running"
      - switch.turn_on: pump_p1_in
      - delay: !lambda "return (uint32_t) (id(pump_calibration_time_s).state * 1000.0f);"
      - switch.turn_off: pump_p1_in
      - text_sensor.template.publish:
          id: kh_status_text
          state: "Enter P1 measured volume"
    web_server:
      sorting_group_id: grp_service
      sorting_weight: 50

  - platform: template
    name: "P2 calibration run"
    id: api_cal_p2_30s
    on_press:
      - text_sensor.template.publish:
          id: kh_mode_text
          state: "Pump calibration"
      - text_sensor.template.publish:
          id: kh_status_text
          state: "P2 calibration running"
      - switch.turn_on: pump_p2_out
      - delay: !lambda "return (uint32_t) (id(pump_calibration_time_s).state * 1000.0f);"
      - switch.turn_off: pump_p2_out
      - text_sensor.template.publish:
          id: kh_status_text
          state: "Enter P2 measured volume"
    web_server:
      sorting_group_id: grp_service
      sorting_weight: 60

  - platform: template
    name: "Save P1 calibration"
    id: api_cal_p1_save
    on_press:
      - lambda: |-
          const float cal_time_s = id(pump_calibration_time_s).state;
          if (cal_time_s <= 0.0f || id(p1_measured_ml).state <= 0.0f) {
            id(kh_error_text).publish_state("Invalid P1 calibration input");
            ESP_LOGW("pump", "Invalid P1 calibration input");
            return;
          }
          id(p1_mlps) = id(p1_measured_ml).state / cal_time_s;
          id(kh_error_text).publish_state("None");
          ESP_LOGI("pump", "P1 ml/s = %.3f", id(p1_mlps));
      - text_sensor.template.publish:
          id: kh_status_text
          state: "P1 calibration saved"
    web_server:
      sorting_group_id: grp_service
      sorting_weight: 70

  - platform: template
    name: "Save P2 calibration"
    id: api_cal_p2_save
    on_press:
      - lambda: |-
          const float cal_time_s = id(pump_calibration_time_s).state;
          if (cal_time_s <= 0.0f || id(p2_measured_ml).state <= 0.0f) {
            id(kh_error_text).publish_state("Invalid P2 calibration input");
            ESP_LOGW("pump", "Invalid P2 calibration input");
            return;
          }
          id(p2_mlps) = id(p2_measured_ml).state / cal_time_s;
          id(kh_error_text).publish_state("None");
          ESP_LOGI("pump", "P2 ml/s = %.3f", id(p2_mlps));
      - text_sensor.template.publish:
          id: kh_status_text
          state: "P2 calibration saved"
    web_server:
      sorting_group_id: grp_service
      sorting_weight: 80

  - platform: template
    name: "Start KH full"
    id: api_start_measure_full
    on_press:
      - text_sensor.template.publish:
          id: kh_mode_text
          state: "Full"
      - lambda: |-
          id(g_speed_mult) = 1.0f;
      - script.execute: kh_aer_core
    web_server:
      sorting_group_id: grp_kh
      sorting_weight: 140

  - platform: template
    name: "Start KH quick"
    id: api_start_measure_quick
    on_press:
      - text_sensor.template.publish:
          id: kh_mode_text
          state: "Quick"
      - lambda: |-
          id(g_speed_mult) = id(quick_factor).state;
      - script.execute: kh_aer_core
    web_server:
      sorting_group_id: grp_kh
      sorting_weight: 150

  - platform: template
    name: "Start service test"
    id: api_start_measure_service
    on_press:
      - text_sensor.template.publish:
          id: kh_mode_text
          state: "Service test"
      - lambda: |-
          id(g_speed_mult) = id(service_test_factor).state;
      - script.execute: kh_aer_core
    web_server:
      sorting_group_id: grp_service
      sorting_weight: 90

  - platform: template
    name: "KH STOP"
    id: api_kh_stop
    on_press:
      - script.stop: kh_measure
      - script.stop: kh_measure_run
      - script.stop: kh_measure_quick
      - script.stop: kh_service_test
      - script.stop: kh_aer_core
      - switch.turn_off: pump_p1_in
      - switch.turn_off: pump_p2_out
      - switch.turn_off: air_pump
      - text_sensor.template.publish:
          id: kh_status_text
          state: "Stopped"
      - text_sensor.template.publish:
          id: kh_mode_text
          state: "Stopped"
    web_server:
      sorting_group_id: grp_kh
      sorting_weight: 160

script:
  - id: kh_measure
    mode: restart
    then:
      - text_sensor.template.publish:
          id: kh_mode_text
          state: "Full"
      - lambda: |-
          id(g_speed_mult) = 1.0f;
      - script.execute: kh_aer_core

  - id: kh_measure_run
    mode: restart
    then:
      - text_sensor.template.publish:
          id: kh_mode_text
          state: "Full"
      - lambda: |-
          id(g_speed_mult) = 1.0f;
      - script.execute: kh_aer_core

  - id: kh_measure_quick
    mode: restart
    then:
      - text_sensor.template.publish:
          id: kh_mode_text
          state: "Quick"
      - lambda: |-
          id(g_speed_mult) = id(quick_factor).state;
      - script.execute: kh_aer_core

  - id: kh_service_test
    mode: restart
    then:
      - text_sensor.template.publish:
          id: kh_mode_text
          state: "Service test"
      - lambda: |-
          id(g_speed_mult) = id(service_test_factor).state;
      - script.execute: kh_aer_core

  - id: kh_aer_core
    mode: restart
    then:
      - text_sensor.template.publish:
          id: kh_status_text
          state: "Prepare times"
      - lambda: |-
          const float vol_ml = id(chamber_ml).state;
          const float mult = id(g_speed_mult);
          float t_fill_s = (id(p1_mlps) > 0.01f) ? (vol_ml / id(p1_mlps)) : id(fallback_fill_s).state;
          float t_drain_s = (id(p2_mlps) > 0.01f) ? (vol_ml / id(p2_mlps)) : id(fallback_drain_s).state;
          id(__t_fill_ms) = (uint32_t) (t_fill_s * 1000.0f * mult);
          id(__t_drain_ms) = (uint32_t) (t_drain_s * 1000.0f * mult);
          id(__t_settle_pre_ms) = (uint32_t) (id(t_settle_pre).state * 1000.0f * mult);
          id(__t_aer_ms) = (uint32_t) (id(t_aer_full).state * 1000.0f * mult);
          id(__t_settle_post_ms) = (uint32_t) (id(t_settle_post).state * 1000.0f * mult);
          id(kh_error_text).publish_state("None");
          ESP_LOGI("kh", "Times[ms] mult=%.2f fill=%u drain=%u settle_pre=%u aer=%u settle_post=%u",
                   mult, id(__t_fill_ms), id(__t_drain_ms), id(__t_settle_pre_ms), id(__t_aer_ms), id(__t_settle_post_ms));

      - text_sensor.template.publish:
          id: kh_status_text
          state: "Drain chamber"
      - switch.turn_on: pump_p2_out
      - delay: !lambda "return id(__t_drain_ms);"
      - switch.turn_off: pump_p2_out

      - text_sensor.template.publish:
          id: kh_status_text
          state: "Fill sample"
      - switch.turn_on: pump_p1_in
      - delay: !lambda "return id(__t_fill_ms);"
      - switch.turn_off: pump_p1_in

      - text_sensor.template.publish:
          id: kh_status_text
          state: "Settle before"
      - delay: !lambda "return id(__t_settle_pre_ms);"

      - if:
          condition:
            lambda: |-
              return id(main_ph_channel) == 0;
          then:
            - component.update: ph_a0_v
          else:
            - component.update: ph_a1_v

      - component.update: ph_main
      - lambda: |-
          id(ph_before).publish_state(id(ph_main).state);
          ESP_LOGI("kh", "pH_before=%.2f", id(ph_before).state);

      - text_sensor.template.publish:
          id: kh_status_text
          state: "Aeration"
      - switch.turn_on: air_pump
      - delay: !lambda "return id(__t_aer_ms);"
      - switch.turn_off: air_pump

      - text_sensor.template.publish:
          id: kh_status_text
          state: "Settle after"
      - delay: !lambda "return id(__t_settle_post_ms);"

      - if:
          condition:
            lambda: |-
              return id(main_ph_channel) == 0;
          then:
            - component.update: ph_a0_v
          else:
            - component.update: ph_a1_v

      - component.update: ph_main
      - lambda: |-
          const float ph2 = id(ph_main).state;
          id(ph_after).publish_state(ph2);
          const float co2eq = id(co2_eq).state;
          const float denom = 3.0f * powf(10.0f, (7.0f - ph2));
          float kh = (denom > 0.0f) ? (co2eq / denom) : 0.0f;
          if (kh < 0.0f) kh = 0.0f;
          if (kh > 30.0f) kh = 30.0f;
          id(kh_last).publish_state(kh);
          ESP_LOGI("kh", "pH_after=%.2f -> KH=%.2f dKH", ph2, kh);

      - text_sensor.template.publish:
          id: kh_status_text
          state: "Return sample"
      - switch.turn_on: pump_p2_out
      - delay: !lambda "return id(__t_drain_ms);"
      - switch.turn_off: pump_p2_out

      - text_sensor.template.publish:
          id: kh_status_text
          state: "Completed"
