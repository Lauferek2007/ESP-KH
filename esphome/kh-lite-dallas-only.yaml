esphome:
  name: kh-lite-dallas
  friendly_name: "KH Lite Dallas"
  comment: "Dallas-only stability test (ADS removed)."

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:
  level: INFO

api:

ota:
  - platform: esphome

web_server:
  port: 80
  version: 3
  log: false

wifi:
  fast_connect: true
  reboot_timeout: 0s
  networks:
    - ssid: !secret wifi_ssid
      password: !secret wifi_password
      manual_ip:
        static_ip: 192.168.1.200
        gateway: 192.168.1.1
        subnet: 255.255.255.0
        dns1: 192.168.1.1
        dns2: 1.1.1.1
  ap:
    ssid: "KH Lite Fallback"
    password: "fallback1234"

captive_portal:

one_wire:
  - platform: gpio
    pin: GPIO4
    id: dallas_bus

sensor:
  - platform: dallas_temp
    id: dallas_temp_c
    name: "Dallas temp [C]"
    one_wire_id: dallas_bus
    update_interval: 5s
    accuracy_decimals: 2

  - platform: wifi_signal
    id: wifi_rssi
    name: "WiFi RSSI"
    update_interval: 30s

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP address"
    ssid:
      name: "WiFi SSID"
